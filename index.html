<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GemAlert</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #111111;
      position: relative;
    }

    .bg-texture {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(255,255,255,0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(80,80,80,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .glass-card {
      position: relative;
      width: 420px;
      padding: 52px 44px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(40px) saturate(150%);
      -webkit-backdrop-filter: blur(40px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        0 16px 64px rgba(0, 0, 0, 0.7),
        0 4px 16px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.25),
        inset 0 -1px 0 rgba(255, 255, 255, 0.06),
        inset 1px 0 0 rgba(255, 255, 255, 0.08),
        inset -1px 0 0 rgba(255, 255, 255, 0.08);
      text-align: center;
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
      z-index: 1;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.12) 0%,
        rgba(255, 255, 255, 0.0) 40%,
        rgba(255, 255, 255, 0.04) 100%
      );
      pointer-events: none;
    }

    .glass-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 20px;
      right: 20px;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.55) 35%,
        rgba(255, 255, 255, 0.55) 65%,
        transparent
      );
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .icon-wrap {
      width: 68px;
      height: 68px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 30px;
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: rgba(255, 255, 255, 0.95);
      margin-bottom: 10px;
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.12s both;
    }

    p {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 32px;
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.16s both;
    }

    .url-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 28px;
      font-family: monospace;
      letter-spacing: 0.03em;
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }

    .url-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(220, 220, 220, 0.6);
      flex-shrink: 0;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px 24px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: rgba(255, 255, 255, 0.92);
      font-size: 14px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition:
        transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1),
        background 0.2s ease,
        box-shadow 0.2s ease,
        border-color 0.2s ease;
      box-shadow:
        0 2px 12px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -1px 0 rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.24s both;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        transparent 30%,
        rgba(255, 255, 255, 0.07) 50%,
        transparent 70%
      );
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .btn:hover::before { transform: translateX(100%); }

    .btn:hover {
      transform: translateY(-1px) scale(1.005);
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.32);
      box-shadow:
        0 8px 28px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        inset 0 -1px 0 rgba(0, 0, 0, 0.3);
    }

    .btn:active { transform: translateY(0) scale(0.985); }

    #status {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      min-height: 18px;
      letter-spacing: 0.02em;
      transition: color 0.3s ease;
    }

    #status.success { color: rgba(210, 210, 210, 0.8); }
    #status.error   { color: rgba(255, 120, 120, 0.75); }
  </style>
</head>
<body>

  <div class="bg-texture"></div>

  <div class="glass-card">
    <div class="icon-wrap">⬡</div>
    <h1>GemAlert</h1>
    <p>Opens the GemAlert app inside a clean about:blank window.</p>
    <div class="url-pill">
      <span class="url-dot"></span>
      badideahere.github.io/gemalertmain
    </div>
    <button class="btn" onclick="openInBlank()">Open in about:blank</button>
    <div id="status"></div>
  </div>

  <script>
    function openInBlank() {
      var url = "https://badideahere.github.io/gemalertmain/";
      var status = document.getElementById("status");
      var win = window.open("about:blank", "_blank");

      if (!win) {
        status.textContent = "Popup blocked — allow popups and try again.";
        status.className = "error";
        return;
      }

      win.location.href = url;

      status.textContent = "Opened in about:blank ✓";
      status.className = "success";

      setTimeout(function() {
        status.textContent = "";
        status.className = "";
      }, 3000);
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GemAlert</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #0a0a0a;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 70%);
      top: -200px;
      left: -200px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
      bottom: -150px;
      right: -150px;
      pointer-events: none;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(180, 180, 180, 0.05) 0%, transparent 70%);
      top: 30%;
      left: 10%;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(120, 120, 120, 0.04) 0%, transparent 70%);
      top: 5%;
      right: 10%;
    }

    .glass-card {
      position: relative;
      width: 420px;
      padding: 52px 44px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(60px) saturate(120%) brightness(1.1);
      -webkit-backdrop-filter: blur(60px) saturate(120%) brightness(1.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow:
        0 0 0 0.5px rgba(255, 255, 255, 0.06) inset,
        0 12px 48px rgba(0, 0, 0, 0.6),
        0 2px 8px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04);
      text-align: center;
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Sheen */
    .glass-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.08) 0%,
        transparent 50%,
        rgba(255, 255, 255, 0.02) 100%
      );
      pointer-events: none;
    }
